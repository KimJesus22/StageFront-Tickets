<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StageFront - Multi-criteria Filter Bar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#353434",
                        "error": "#ffb4ab",
                        "inverse-surface": "#e5e2e1",
                        "on-secondary": "#313032",
                        "primary-fixed": "#e2e2e2",
                        "on-primary-fixed-variant": "#454747",
                        "tertiary": "#ffffff",
                        "outline": "#8e9192",
                        "on-secondary-fixed-variant": "#474649",
                        "primary": "#ffffff",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "surface-container-low": "#1c1b1b",
                        "on-tertiary": "#2f3131",
                        "tertiary-fixed": "#e2e2e2",
                        "on-error-container": "#ffdad6",
                        "outline-variant": "#444748",
                        "secondary-fixed": "#e5e1e4",
                        "surface-container-lowest": "#0e0e0e",
                        "surface": "#141313",
                        "background": "#141313",
                        "surface-container": "#201f1f",
                        "inverse-primary": "#5d5f5f",
                        "on-tertiary-fixed-variant": "#454747",
                        "surface-dim": "#141313",
                        "surface-container-high": "#2a2a2a",
                        "secondary-fixed-dim": "#c8c6c8",
                        "primary-container": "#e2e2e2",
                        "surface-tint": "#c6c6c7",
                        "error-container": "#93000a",
                        "on-surface": "#e5e2e1",
                        "on-tertiary-container": "#636565",
                        "tertiary-container": "#e2e2e2",
                        "on-surface-variant": "#c4c7c8",
                        "surface-bright": "#3a3939",
                        "secondary": "#c8c6c8",
                        "inverse-on-surface": "#313030",
                        "on-primary-fixed": "#1a1c1c",
                        "on-primary-container": "#636565",
                        "secondary-container": "#474649",
                        "on-secondary-container": "#b7b4b7",
                        "on-background": "#e5e2e1",
                        "primary-fixed-dim": "#c6c6c7",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-secondary-fixed": "#1c1b1d",
                        "on-primary": "#2f3131",
                        "on-error": "#690005",
                        "surface-container-highest": "#353434",
                        "emerald": {
                            500: "#10b981"
                        }
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "stack-sm": "8px",
                        "margin-desktop": "48px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "stack-md": "24px",
                        "unit": "4px",
                        "stack-lg": "48px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "display-xl": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-bottom-color: #10b981;
            box-shadow: 0 1px 0 0 #10b981;
        }
        .neon-active {
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-zinc-950 text-on-background min-h-screen font-body-md pt-32">
<!-- TopAppBar JSON Component (Rendered for context/consistency) -->
<header class="fixed top-0 left-0 w-full z-50 bg-zinc-950/80 backdrop-blur-xl border-b border-white/10 shadow-none">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
<div class="text-2xl font-black tracking-tighter text-white font-['Space_Grotesk']">
                StageFront
            </div>
<nav class="hidden md:flex items-center space-x-8 font-['Space_Grotesk'] tracking-tight">
<a class="text-zinc-500 hover:text-zinc-300 transition-colors hover:bg-white/5 duration-300 px-3 py-2 rounded-lg" href="#">Artists</a>
<a class="text-white border-b-2 border-white pb-1 scale-95 opacity-80" href="#">Events</a>
<a class="text-zinc-500 hover:text-zinc-300 transition-colors hover:bg-white/5 duration-300 px-3 py-2 rounded-lg" href="#">Venues</a>
<a class="text-zinc-500 hover:text-zinc-300 transition-colors hover:bg-white/5 duration-300 px-3 py-2 rounded-lg" href="#">Vault</a>
</nav>
<div class="flex items-center space-x-4">
<button aria-label="notifications" class="text-zinc-500 hover:text-white transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button aria-label="local_ticket" class="text-zinc-500 hover:text-white transition-colors">
<span class="material-symbols-outlined">PaintBucket</span>
</button>
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-white/10 ml-2">
<img alt="User profile" class="w-full h-full object-cover" data-alt="A close-up profile portrait of a confident young woman with dramatic, high-contrast studio lighting. She has subtle neon green color highlights reflecting off her skin, fitting a premium, cyberpunk or ethereal tech aesthetic. The background is a pure, deep dark void (zinc-950 equivalent)." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCXOjdFknH_2sYt0tWLyPK0SKfe-7_HTz41p-DVd6u3QgxVB5s0N1zBAe0kXg65jNAOiv9R19LaJ75yweGn028oH1KC02z4PiZK6uLRAMzJBCuLldvznSLiUSKN23X3zkAVlwX2K3IuQdkAJs6P1-trs1xsmVrxpBU0_1qsau4IpNkpHl2J_-Krh_uRgeL6XHk0HNEt27EYvFjzhT8o1Haw_EkoEo7cryX6qzt63F_97PyqzGsUeksL63rurFK9YD8gmwqxsaD9SVU"/>
</div>
</div>
</div>
</header>
<main class="max-w-[container-max] mx-auto px-margin-mobile md:px-margin-desktop py-stack-lg">
<!-- Multi-criteria Filter Bar -->
<div class="glass-panel rounded-xl p-stack-sm md:p-4 w-full flex flex-col md:flex-row items-center gap-gutter relative z-20">
<!-- State Filters (Quick Tabs) -->
<div class="flex p-1 bg-surface-container rounded-lg border border-white/5 w-full md:w-auto flex-shrink-0">
<button class="flex-1 md:flex-none px-6 py-2 rounded-md neon-active font-label-caps text-label-caps transition-all">
                    En Venta
                </button>
<button class="flex-1 md:flex-none px-6 py-2 rounded-md text-on-surface-variant hover:text-white font-label-caps text-label-caps transition-all">
                    Próximamente
                </button>
</div>
<!-- Vertical Divider (Desktop) -->
<div class="hidden md:block w-px h-10 bg-white/10 mx-2"></div>
<div class="flex flex-col lg:flex-row w-full gap-stack-md lg:gap-gutter items-center">
<!-- City Selector with Internal Search -->
<div class="relative w-full lg:w-48 group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-sm">location_on</span>
</div>
<input class="w-full pl-10 pr-4 py-2 bg-transparent glass-input rounded-none font-body-md text-body-md text-white placeholder-outline-variant focus:ring-0" placeholder="Ciudad..." type="text"/>
<div class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-sm group-hover:text-emerald-500 transition-colors">expand_more</span>
</div>
</div>
<!-- Artist Selector with Thumbnails -->
<div class="relative w-full lg:w-64 group cursor-pointer">
<div class="flex items-center w-full px-3 py-2 bg-transparent glass-input rounded-none">
<div class="flex -space-x-2 mr-3">
<img alt="Artist 1" class="inline-block h-6 w-6 rounded-full ring-2 ring-zinc-950" data-alt="A highly stylized, moody portrait of a male electronic music artist wearing sleek black clothing. The lighting is low-key with a striking neon green rim light outlining his silhouette against a pitch-black background. It conveys a sense of premium, high-tech exclusivity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDz1RdjCf1GD99geh7BTGreBVjDljGCQ9Svi0ukT3GVq5C1LMN1GX41C0RPsJniezTH5iXNzpaDmA5GjieVJoF6Zk_-T6njm4zA5XCh3PWk-sk3HraUIGr6_IyYb9eahQj_ehcyQGMEte_RX2LIA5g_bnqFYBU0eywCxjfpVKnASLRYteurLAVtP0d2bETAWc9Pi52Di8HiVr1CX-l37UOLszCXeN7Oy4kmswa9Abqtz3Vfiapy9qFCENYUDVUUYxSMy3vOcSmfQ0w"/>
<img alt="Artist 2" class="inline-block h-6 w-6 rounded-full ring-2 ring-zinc-950" data-alt="A dynamic action shot of a female DJ performing live, captured from a low angle. She is bathed in vibrant, ethereal neon green laser lights slicing through atmospheric fog in a massive, dark industrial venue. The aesthetic is extremely high-energy and cyberpunk." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7U0zF4nMJs9JGHSzLGj3mdz5_8tyDPyp_Na4P2Urh4Pl5Ut6P5rtV1PI0VTW1OK_wTuX0d__ajlE9C53ByDrhIlNyqQmDepym-AEnwARx6AiV3wl4bGQ_RjH6kdv8HDogAjvkfVq6eX0i4KOWNks77YurOlIqdwlBClcg_gDjZbOaiDJCKrfxsvXBXYqnvTpDJWxQnnwYeAQkEXLGIvQk8oreU1MgmTOC8d_l77ux52iTo-hnGzHW8dz6eG8w6qek6e18alzyFXI"/>
</div>
<span class="font-body-md text-body-md text-on-surface-variant flex-grow truncate">Todos los Artistas</span>
<span class="material-symbols-outlined text-outline-variant text-sm group-hover:text-emerald-500 transition-colors">expand_more</span>
</div>
</div>
<!-- Price Range Inputs -->
<div class="flex items-center space-x-2 w-full lg:w-auto">
<span class="material-symbols-outlined text-outline-variant text-sm">payments</span>
<input class="w-20 px-2 py-2 bg-transparent glass-input text-center font-body-md text-body-md text-white placeholder-outline-variant focus:ring-0" min="0" placeholder="Min" type="number"/>
<span class="text-outline-variant">-</span>
<input class="w-20 px-2 py-2 bg-transparent glass-input text-center font-body-md text-body-md text-white placeholder-outline-variant focus:ring-0" min="0" placeholder="Max" type="number"/>
</div>
<!-- Calendar/Date Input -->
<div class="relative w-full lg:w-40 group">
<input class="w-full px-3 py-2 bg-transparent glass-input rounded-none font-body-md text-body-md text-on-surface-variant focus:text-white focus:ring-0 appearance-none" type="date"/>
</div>
</div>
<!-- Reset Button -->
<div class="w-full md:w-auto flex justify-end flex-shrink-0 mt-4 md:mt-0">
<button class="flex items-center space-x-2 text-outline hover:text-emerald-500 transition-colors font-label-caps text-label-caps px-4 py-2">
<span class="material-symbols-outlined text-sm">refresh</span>
<span>Restablecer</span>
</button>
</div>
</div>
</main>
</body></html>
