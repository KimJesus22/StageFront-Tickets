<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StageFront - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-error-container": "#ffdad6",

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex antialiased selection:bg-primary selection:text-surface">
<!-- Left Form Section (40%) -->
<main class="w-full lg:w-[40%] min-h-screen flex flex-col relative z-20 glass-panel shadow-[10px_0_30px_rgba(0,0,0,0.5)]">
<!-- Brand Header -->
<header class="p-8 lg:p-12 w-full flex items-center justify-between">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">confirmation_number</span>
<span class="font-headline-md text-headline-md tracking-tighter">StageFront</span>
</div>
</header>
<!-- Form Container -->
<div class="flex-1 flex flex-col justify-center px-8 lg:px-16 pb-12 w-full max-w-md mx-auto">
<div class="mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Bienvenido de vuelta</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Acceso exclusivo a la escena.</p>
</div>
<!-- Auth Toggle -->
<div class="flex border-b border-outline-variant/30 mb-stack-md">
<button class="flex-1 pb-3 text-center border-b-2 border-primary text-primary font-label-caps text-label-caps tracking-widest uppercase transition-colors">
                    Iniciar Sesión
                </button>
<button class="flex-1 pb-3 text-center border-b-2 border-transparent text-on-surface-variant hover:text-primary font-label-caps text-label-caps tracking-widest uppercase transition-colors">
                    Crear Cuenta
                </button>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest mb-3 ml-1" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full custom-input rounded-DEFAULT py-4 pl-12 pr-4 text-primary font-body-md text-body-md placeholder-on-surface-variant/50 focus:outline-none transition-all duration-300" id="email" placeholder="tu@email.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-3 ml-1 mr-1">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="password">Contraseña</label>
<a class="font-label-caps text-[10px] text-on-surface-variant hover:text-primary transition-colors uppercase tracking-wider" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full custom-input rounded-DEFAULT py-4 pl-12 pr-12 text-primary font-body-md text-body-md placeholder-on-surface-variant/50 focus:outline-none transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-surface font-label-caps text-label-caps uppercase tracking-widest py-4 rounded-DEFAULT hover:bg-tertiary-container transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:shadow-[0_0_30px_rgba(255,255,255,0.2)] mt-stack-md flex justify-center items-center gap-2" type="submit">
                    Entrar
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative mt-12 mb-8 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative bg-background/50 backdrop-blur-md px-4 font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest">
                    O continuar con
                </div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 custom-input rounded-DEFAULT text-on-surface hover:text-primary transition-all duration-300 group">
<svg class="w-5 h-5 text-on-surface-variant group-hover:text-primary transition-colors" fill="currentColor" viewbox="0 0 24 24"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"></path></svg>
<span class="font-label-caps text-[11px] uppercase tracking-wider">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 custom-input rounded-DEFAULT text-on-surface hover:text-primary transition-all duration-300 group">
<svg class="w-5 h-5 text-on-surface-variant group-hover:text-primary transition-colors" fill="currentColor" viewbox="0 0 24 24"><path d="M22,12c0-5.52-4.48-10-10-10S2,6.48,2,12c0,4.84,3.44,8.87,8,9.8V15H8v-3h2V9.5C10,7.57,11.57,6,13.5,6H16v3h-2c-0.55,0-1,0.45-1,1v2h3v3h-3v6.95C18.05,21.45,22,17.19,22,12z"></path></svg>
<span class="font-label-caps text-[11px] uppercase tracking-wider">Apple</span>
</button>
</div>
</div>
</main>
<!-- Right Visual Section (60%) - Hidden on mobile -->
<aside class="hidden lg:block w-[60%] h-screen relative bg-surface-lowest overflow-hidden">
<!-- Base ambient glow -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-surface-variant/20 via-background to-background z-0"></div>
<!-- Asymmetric Collage Grid -->
<div class="relative z-10 w-full h-full p-6 grid grid-cols-12 grid-rows-12 gap-4">
<!-- Large Image (BTS / Purple) -->
<div class="col-span-7 row-span-12 relative rounded-xl overflow-hidden group shadow-2xl">
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent z-10"></div>
<div class="absolute inset-0 bg-purple-900/20 mix-blend-overlay z-10 group-hover:bg-purple-900/10 transition-all duration-700"></div>
<img class="w-full h-full object-cover filter grayscale-[20%] contrast-125 group-hover:scale-105 transition-transform duration-1000" data-alt="A dramatic, high-end concert photograph of a K-pop male group performing on a massive stage. The scene is bathed in intense, vibrant purple neon lighting that cuts through dark, atmospheric smoke. The mood is euphoric, exclusive, and technologically advanced, fitting a premium digital platform. High contrast Ethereal Tech aesthetic with deep blacks and vivid purple accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7p0wNCLdn_SCCSK4ZvnH17ywsdNbg1_brl7VYydWQ46W_CBKaYnJg7yjZXWnT626MHJRTO5pvbClcJpKtY99zzBUicrxJTa_IeJnwzk-8iMozgVyuwoQAw7P2G9Sg1uypX54WE4QgI6rESlVb54tBelk7ctxAgd6LJRDZtCcVTv8WZ0vC_wq3OCYaVshhjizKFz0SSItpI9NXlDeHPIlQyDhnXr9OYxoCmnUfN6mR4LQSb73W5H3FiBZ0nhCdPvFW88TWLiS-1sQ"/>
<div class="absolute bottom-8 left-8 z-20">
<span class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-surface/40 backdrop-blur-md border border-purple-500/30 font-label-caps text-[10px] text-white uppercase tracking-widest shadow-[0_0_15px_rgba(168,85,247,0.4)] mb-2">
<span class="w-1.5 h-1.5 rounded-full bg-purple-400 animate-pulse"></span>
                        Live
                    </span>
<h2 class="font-display-xl text-[48px] text-white leading-none tracking-tighter">SEOUL<br/>NIGHTS</h2>
</div>
</div>
<!-- Top Right Image (Blackpink / Pink) -->
<div class="col-span-5 row-span-7 relative rounded-xl overflow-hidden group shadow-2xl">
<div class="absolute inset-0 bg-gradient-to-tr from-background/80 via-transparent to-transparent z-10"></div>
<div class="absolute inset-0 bg-pink-900/20 mix-blend-overlay z-10 group-hover:bg-pink-900/10 transition-all duration-700"></div>
<img class="w-full h-full object-cover filter grayscale-[30%] contrast-125 group-hover:scale-105 transition-transform duration-1000" data-alt="A stylish, high-fashion portrait shot of a female K-pop group in a futuristic setting. They are illuminated by striking pink neon edge-lighting against a deep black, glossy backdrop. The image exudes exclusivity, mystery, and premium production value. Subtle glassmorphism reflections are visible in the dark environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDL6QRflK-_QTZSHkulRXxK0c9ZWTJ2YWRnQ7Nso-Jk8wq7Q4IdeGJeF8GPNYXp8fSaCLMcrLW8_X-dDw0UDCw1cxAT3nYOByJbf3Fr7yp1yPQc6vWLCgzGTsqcah1aenHTB1r26oZGWy2oFGHdej8CR-u3dI9nO2VZW6npH8tvldt-bHppQOzGEJx8xFDGzAs85x-0sjt-ba5_2_qtEcODneKxJiFHMVrJZDeAjCGbMi22fQMpwFxfyHX_uwuLpFp0OTCy5K6ES0E"/>
</div>
<!-- Bottom Right Image (Alternative / Cyan & Yellow) -->
<div class="col-span-5 row-span-5 relative rounded-xl overflow-hidden group shadow-2xl">
<div class="absolute inset-0 bg-gradient-to-r from-cyan-900/30 to-yellow-900/30 mix-blend-overlay z-10 group-hover:opacity-50 transition-all duration-700"></div>
<div class="absolute inset-0 bg-background/40 z-0"></div>
<img class="w-full h-full object-cover filter grayscale contrast-150 group-hover:scale-105 transition-transform duration-1000" data-alt="Dynamic dual-toned concert imagery blending high-energy alternative rock performances. The left side features striking cyan neon lights cutting through dense fog, while the right side is dominated by intense yellow and red strobe effects. The overall look is dark, high-contrast, Ethereal Tech aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBO6lar2BZRz1oqN6X6YsKBz1gu8LLiRBDUZoS31PcJLfL5XIkMK7plzDrOrWFpycgTzBmQbrHh3C5u2IIVg4d-d5LOEsNvgNunWok-cjyME6MEwIxl3nwd7pQJJM0iepVyOSkekfU0zl01t4nmsr0TBDI5Yb-cAVObP9PvdOL9eDJJ0WqyCXg5CmMvFKdfHnbGjg_imRvk52vzWqcXonoU9zsTcbbCU1jp5LvQbrH_xXzvhCD7z6rfpzGBV4ErLmrz8CCM3k5-JuM"/>
<!-- Overlay abstract elements -->
<div class="absolute top-4 right-4 z-20 flex gap-2">
<div class="w-8 h-1 bg-cyan-500/80 rounded-full shadow-[0_0_10px_rgba(6,182,212,0.8)]"></div>
<div class="w-4 h-1 bg-yellow-500/80 rounded-full shadow-[0_0_10px_rgba(234,179,8,0.8)]"></div>
</div>
</div>
</div>
</aside>
</body></html>
