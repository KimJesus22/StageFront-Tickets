        body { background-color: theme('colors.background'); color: theme('colors.on-background'); }

<body class="min-h-screen font-body-md text-body-md antialiased overflow-hidden flex flex-col">
<!-- TopAppBar Snippet Context -->
<header class="docked full-width top-0 z-40 bg-background/80 backdrop-blur-md shadow-none flex justify-between items-center w-full px-6 h-16 border-b border-primary/10">
<!-- Brand / Logo Area -->
<div class="flex items-center gap-4">
<span class="font-headline-md text-headline-md text-primary tracking-tighter">Nexus Admin</span>
</div>
<!-- Navigation Placeholder (Simulated) -->
<nav class="hidden md:flex gap-8">
<!-- Empty for contextual focus -->
</nav>
<!-- Right Side Actions & User Dropdown -->
<div class="flex items-center gap-6 relative">
<!-- Trailing Actions (Notifications, Settings, etc.) -->
<div class="flex items-center gap-4 text-on-surface-variant">
<button class="hover:bg-primary/5 transition-colors p-2 rounded-full flex items-center justify-center opacity-80 hover:opacity-100 hover:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
<!-- User Dropdown Trigger -->
<div class="relative group cursor-pointer">
<div class="flex items-center gap-3 py-1 px-2 rounded-full hover:bg-primary/5 transition-colors">
<img alt="Administrator Avatar" class="w-8 h-8 rounded-full border border-primary/10 object-cover" data-alt="A cinematic, high-contrast portrait of a professional man in his late 20s. He has short dark hair and a serious expression. The lighting is dramatic, with subtle neon blue accents reflecting on his face, fitting an exclusive, high-tech, dark-mode aesthetic. Deep shadows and pristine white highlights." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBjkZ-2Zm6uQlui3rg3ug0jeoUr3d9aphFDhvpGY2EWhpL2r4yCXN5IziIRBpx1kDjDESmMQekRP7UG_5RSy3BILhPKe-y8fgvLfk3U4XviqwQ82YcOj5G-ph4vYRuhe1uKaME5HFeYGttK0NYOclXrodEcb9_YDmgDIa9o-iMZ755qk8ta2Y9ggt_r8M-iUf1RxbDB2NP3gvOkDCHIj4wjoAmi-_NAPXdsk_lPv1fEtZ1GgRJ5gfmUFpKqbg_WKnqPM7xtLjo7sAU"/>
<span class="font-body-md text-body-md font-medium text-primary hidden md:block">Alex Rivera</span>
<span class="material-symbols-outlined text-on-surface-variant ml-1 text-sm transition-transform group-hover:rotate-180 duration-300" data-icon="expand_more">expand_more</span>
</div>
<!-- Open Dropdown Container -->
<div class="absolute right-0 top-full mt-2 w-56 z-50 bg-[#18181b]/90 backdrop-blur-md border border-primary/10 rounded-xl shadow-2xl shadow-black/50 overflow-hidden transform origin-top-right transition-all duration-200">
<!-- Menu Options -->
<div class="py-2 flex flex-col">
<a class="flex items-center gap-3 px-4 py-3 font-body-md text-sm text-on-surface-variant hover:bg-primary/5 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-lg" data-icon="person">person</span>
                            Mi Perfil
                        </a>
<a class="flex items-center gap-3 px-4 py-3 font-body-md text-sm text-on-surface-variant hover:bg-primary/5 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-lg" data-icon="confirmation_number">confirmation_number</span>
                            Mis Boletos
                        </a>
</div>
<!-- Divider -->
<div class="border-t border-primary/10"></div>
<!-- Logout Action -->
<div class="py-2">
<button class="w-full flex items-center gap-3 px-4 py-3 font-body-md text-sm text-error hover:bg-error/10 hover:text-error-container transition-colors text-left">
<span class="material-symbols-outlined text-lg" data-icon="logout">logout</span>
                            Cerrar Sesión
                        </button>
</div>
</div>
</div>
</div>
</header>
<!-- Main Content Canvas Canvas Canvas Background (Dark, Cinematic Context) -->
<main class="flex-1 w-full flex items-center justify-center relative p-gutter">
<!-- Abstract glowing orbs to emphasize the glassmorphism drop down -->
<div class="absolute top-1/4 right-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-1/3 left-1/3 w-64 h-64 bg-on-secondary-container/5 rounded-full blur-[80px] pointer-events-none"></div>
<div class="text-center text-on-surface-variant opacity-50 font-body-md">
            Click the user avatar in the top right to view the dropdown interaction.
        </div>
</main>
