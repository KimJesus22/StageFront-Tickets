<!-- Background Context (Dimmed Event Page) -->
<div class="fixed inset-0 z-0 select-none pointer-events-none">

<div class="absolute inset-0 bg-gradient-to-b from-background via-transparent to-background opacity-80"></div>

<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
<!-- Authentication Modal -->
<div class="w-full max-w-md bg-zinc-900/90 backdrop-blur-[40px] border border-white/10 rounded-2xl shadow-2xl overflow-hidden flex flex-col relative transition-transform duration-300 transform scale-100">
<!-- Modal Header -->
<div class="flex items-center justify-between p-6 border-b border-white/5">
<h2 class="font-headline-md text-headline-md text-primary">Autentica tu cuenta</h2>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body -->
<div class="p-6 flex flex-col gap-6">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Tu código de autenticación ha sido enviado a j**********5@gmail.com. Introduce tu código a continuación para continuar.
                </p>
<!-- Input Field -->
<div class="relative group">
<input aria-label="Authentication code" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-4 font-headline-md text-headline-md text-center text-primary tracking-[0.5em] focus:border-primary/50 focus:bg-white/10 focus:ring-1 focus:ring-primary/50 transition-all placeholder:text-on-surface-variant/30 outline-none" maxlength="6" placeholder="••••••" type="text"/>
</div>
<!-- Resend Link -->
<div class="flex justify-center mt-2">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary underline decoration-white/20 underline-offset-4 transition-colors" href="#">
                        Solicita un nuevo código
                    </a>
</div>
</div>
<!-- Modal Footer -->
<div class="flex items-center justify-end gap-4 p-6 bg-white/[0.02] border-t border-white/5">
<button class="px-6 py-3 rounded-lg font-body-md text-body-md font-medium text-on-surface hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50" type="button">
                    Cancelar
                </button>
<button class="px-6 py-3 rounded-lg bg-primary text-background font-body-md text-body-md font-semibold hover:bg-white/90 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-zinc-900 shadow-[0_0_20px_rgba(255,255,255,0.1)]" type="button">
                    Confirma código
                </button>
</div>
<!-- Subtle glow effect top left -->
<div class="absolute -top-10 -left-10 w-32 h-32 bg-primary/10 rounded-full blur-[40px] pointer-events-none"></div>
</div>
