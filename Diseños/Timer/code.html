<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reservation Countdown</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#353434",
                        "outline": "#8e9192",
                        "inverse-primary": "#5d5f5f",
                        "on-primary-fixed": "#1a1c1c",
                        "on-primary-container": "#636565",
                        "on-tertiary-fixed": "#1a1c1c",
                        "secondary-fixed": "#e5e1e4",
                        "primary": "#ffffff",
                        "on-secondary-fixed": "#1c1b1d",
                        "surface-container-low": "#1c1b1b",
                        "on-surface-variant": "#c4c7c8",
                        "secondary-container": "#474649",
                        "outline-variant": "#444748",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed-variant": "#454747",
                        "on-error": "#690005",
                        "on-tertiary-container": "#636565",
                        "surface": "#141313",
                        "on-surface": "#e5e2e1",
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#b7b4b7",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container": "#201f1f",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-background": "#e5e2e1",
                        "surface-bright": "#3a3939",
                        "error": "#ffb4ab",
                        "primary-container": "#e2e2e2",
                        "error-container": "#93000a",
                        "background": "#141313",
                        "surface-container-high": "#2a2a2a",
                        "on-secondary-fixed-variant": "#474649",
                        "on-primary": "#2f3131",
                        "secondary-fixed-dim": "#c8c6c8",
                        "primary-fixed-dim": "#c6c6c7",
                        "surface-tint": "#c6c6c7",
                        "on-secondary": "#313032",
                        "surface-dim": "#141313",
                        "secondary": "#c8c6c8",
                        "inverse-surface": "#e5e2e1",
                        "tertiary": "#ffffff",
                        "primary-fixed": "#e2e2e2",
                        "surface-variant": "#353434",
                        "tertiary-fixed": "#e2e2e2",
                        "tertiary-container": "#e2e2e2",
                        "inverse-on-surface": "#313030",
                        "on-tertiary": "#2f3131"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "24px",
                        "unit": "4px",
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "stack-sm": "8px",
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "stack-lg": "48px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Space Grotesk"],
                        "display-xl": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "display-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes blink-fast {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .animate-blink-fast {
            animation: blink-fast 1s step-end infinite;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen">
<!-- Normal State -->
<div class="sticky top-0 z-50 w-full bg-white/5 backdrop-blur-md border-b border-white/10 px-6 py-3">
<div class="max-w-[1280px] mx-auto flex items-center justify-between md:justify-center md:gap-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline animate-pulse-slow">hourglass_empty</span>
<span class="font-body-md text-body-md text-outline">Tus asientos están reservados por</span>
</div>
<div class="font-headline-md text-headline-md text-primary tracking-widest">
                10:00
            </div>
</div>
</div>
<div class="h-32"></div> <!-- Spacer for demonstration -->
<!-- Critical State -->
<div class="sticky top-0 z-50 w-full bg-error-container/20 backdrop-blur-md border-b border-error/20 px-6 py-3">
<div class="max-w-[1280px] mx-auto flex items-center justify-between md:justify-center md:gap-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-error animate-blink-fast">hourglass_bottom</span>
<span class="font-body-md text-body-md text-error">Tus asientos están reservados por</span>
</div>
<div class="font-headline-md text-headline-md text-error tracking-widest animate-blink-fast">
                00:59
            </div>
</div>
</div>
<!-- Content to show stickiness -->
<main class="max-w-[1280px] mx-auto p-8 mt-8">
<h1 class="font-display-xl text-display-xl text-primary mb-8">Checkout</h1>
<div class="grid grid-cols-1 md:grid-cols-12 gap-8">
<div class="md:col-span-8 space-y-6">
<!-- Example Content Block -->
<div class="bg-surface-container-low rounded-xl p-6 border border-white/5">
<h2 class="font-headline-lg text-headline-lg text-primary mb-4">Payment Details</h2>
<div class="h-64 bg-surface-container-highest rounded-lg opacity-50"></div>
</div>
</div>
<div class="md:col-span-4">
<div class="bg-surface-container-high rounded-xl p-6 border border-white/5 sticky top-32">
<h2 class="font-headline-md text-headline-md text-primary mb-4">Order Summary</h2>
<div class="space-y-4">
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>2x VIP Tickets</span>
<span>$400.00</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Service Fee</span>
<span>$45.00</span>
</div>
<div class="border-t border-white/10 pt-4 mt-4 flex justify-between font-headline-md text-headline-md text-primary">
<span>Total</span>
<span>$445.00</span>
</div>
</div>
</div>
</div>
</div>
</main>
</body></html>
