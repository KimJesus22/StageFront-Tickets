<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inputs with Validation States - StageFront</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#201f1f",
                        "tertiary-fixed": "#e2e2e2",
                        "primary": "#ffffff",
                        "on-background": "#e5e2e1",
                        "background": "#141313",
                        "secondary-fixed": "#e5e1e4",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-secondary": "#313032",
                        "on-primary-container": "#636565",
                        "outline-variant": "#444748",
                        "surface-variant": "#353434",
                        "surface-container-low": "#1c1b1b",
                        "secondary-container": "#474649",
                        "tertiary": "#ffffff",
                        "primary-fixed": "#e2e2e2",
                        "on-tertiary": "#2f3131",
                        "inverse-surface": "#e5e2e1",
                        "outline": "#8e9192",
                        "on-tertiary-container": "#636565",
                        "on-primary-fixed": "#1a1c1c",
                        "on-secondary-fixed-variant": "#474649",
                        "inverse-primary": "#5d5f5f",
                        "primary-fixed-dim": "#c6c6c7",
                        "surface-bright": "#3a3939",
                        "on-error": "#690005",
                        "on-tertiary-fixed": "#1a1c1c",
                        "error": "#ffb4ab",
                        "primary-container": "#e2e2e2",
                        "on-secondary-fixed": "#1c1b1d",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-primary-fixed-variant": "#454747",
                        "error-container": "#93000a",
                        "surface-container-high": "#2a2a2a",
                        "on-secondary-container": "#b7b4b7",
                        "secondary-fixed-dim": "#c8c6c8",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary-container": "#e2e2e2",
                        "surface": "#141313",
                        "surface-tint": "#c6c6c7",
                        "secondary": "#c8c6c8",
                        "on-surface-variant": "#c4c7c8",
                        "on-primary": "#2f3131",
                        "surface-dim": "#141313",
                        "surface-container-highest": "#353434",
                        "on-surface": "#e5e2e1",
                        "inverse-on-surface": "#313030"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "stack-sm": "8px",
                        "container-max": "1280px",
                        "margin-desktop": "48px",
                        "stack-lg": "48px",
                        "unit": "4px",
                        "stack-md": "24px"
                    },
                    fontFamily: {
                        "headline-md": ["Space Grotesk"],
                        "display-xl": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Space Grotesk"],
                        "body-lg": ["Inter"]
                    },
                    fontSize: {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "display-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-zinc-950 text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-white/20 selection:text-white">
<!-- TopNavBar -->
<nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 lg:px-12 bg-zinc-950/70 backdrop-blur-xl border-b border-white/10">
<div class="flex items-center gap-8">
<a class="text-2xl font-bold tracking-tighter text-white uppercase font-['Space_Grotesk']" href="#">StageFront</a>
<div class="hidden md:flex gap-6">
<a class="text-zinc-400 font-medium hover:text-white hover:bg-white/5 transition-all duration-300 px-3 py-1 rounded" href="#">Discover</a>
<a class="text-zinc-400 font-medium hover:text-white hover:bg-white/5 transition-all duration-300 px-3 py-1 rounded" href="#">Venues</a>
<a class="text-zinc-400 font-medium hover:text-white hover:bg-white/5 transition-all duration-300 px-3 py-1 rounded" href="#">Schedule</a>
</div>
</div>
<div class="flex items-center gap-4">
<button class="hidden md:flex items-center justify-center text-zinc-400 hover:text-white transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
<button class="hidden md:flex items-center justify-center text-zinc-400 hover:text-white transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="text-white bg-white/10 hover:bg-white/20 transition-all duration-300 px-4 py-2 rounded-full font-medium text-sm">
                My Tickets
            </button>
</div>
</nav>
<!-- Main Canvas -->
<main class="flex-grow pt-[100px] pb-16 px-6 lg:px-12 flex flex-col items-center justify-center">
<div class="w-full max-w-2xl">
<div class="mb-12 text-center">
<h1 class="font-display-xl text-display-xl text-primary mb-4">Input States</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Component Showcase / Ethereal Tech System</p>
</div>
<!-- Glass Card Container -->
<div class="bg-surface-container-low/40 backdrop-blur-[20px] border border-white/10 rounded-xl p-8 lg:p-12 shadow-[0_0_40px_rgba(0,0,0,0.5)] relative overflow-hidden">
<!-- Subtle ambient glow -->
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-white/5 to-transparent pointer-events-none"></div>
<div class="flex flex-col gap-stack-lg relative z-10">
<!-- 1. Input Standard -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest ml-1" for="input-standard">Correo Electrónico</label>
<input class="w-full bg-white/5 border border-white/10 text-primary font-body-md text-body-md rounded-lg px-4 py-3 placeholder:text-zinc-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all duration-300" id="input-standard" placeholder="ejemplo@correo.com" type="email"/>
</div>
<!-- 2. Input with Focus (Simulated) -->
<div class="flex flex-col gap-stack-sm relative group">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest ml-1" for="input-focus">Nombre Completo</label>
<div class="relative">
<input class="w-full bg-white/5 border border-emerald-500/50 text-primary font-body-md text-body-md rounded-lg px-4 py-3 outline-none ring-2 ring-emerald-500/50 transition-all duration-300 shadow-[0_0_15px_rgba(16,185,129,0.15)]" id="input-focus" type="text" value="Alex Rivera"/>
<!-- Simulated blinking cursor line -->
<div class="absolute top-1/2 -translate-y-1/2 left-[95px] w-[2px] h-[20px] bg-emerald-500 animate-pulse"></div>
</div>
</div>
<!-- 3. Input with Error -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest ml-1" for="input-error">Código de Verificación</label>
<div class="relative">
<input class="w-full bg-red-500/5 border border-red-500/50 text-primary font-body-md text-body-md rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-red-500/50 pr-10 transition-all duration-300" id="input-error" type="text" value="123"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-red-400" data-icon="error">error</span>
</div>
<p class="text-sm text-red-400 font-body-md mt-1 ml-1">El código OTP debe tener 6 dígitos</p>
</div>
<!-- Submit Action -->
<div class="mt-8 pt-8 border-t border-white/10 flex justify-end">
<button class="bg-primary text-background font-label-caps text-label-caps uppercase tracking-widest px-8 py-4 rounded-lg hover:bg-white/90 transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:shadow-[0_0_30px_rgba(255,255,255,0.2)]">
                            Submit Form
                        </button>
</div>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-16 px-8 flex flex-col md:flex-row justify-between items-center gap-8 bg-zinc-950 border-t border-zinc-800">
<div class="text-lg font-black text-white font-['Space_Grotesk'] tracking-tighter">StageFront</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="text-zinc-500 hover:text-cyan-400 transition-colors duration-200 font-['Inter'] text-sm uppercase tracking-widest" href="#">Privacy Policy</a>
<a class="text-zinc-500 hover:text-cyan-400 transition-colors duration-200 font-['Inter'] text-sm uppercase tracking-widest" href="#">Terms of Service</a>
<a class="text-zinc-500 hover:text-cyan-400 transition-colors duration-200 font-['Inter'] text-sm uppercase tracking-widest" href="#">Security</a>
<a class="text-zinc-500 hover:text-cyan-400 transition-colors duration-200 font-['Inter'] text-sm uppercase tracking-widest" href="#">Help Center</a>
</div>
<div class="text-zinc-500 font-['Inter'] text-sm uppercase tracking-widest">© 2024 StageFront. High-Fidelity Access.</div>
</footer>
</body></html>
