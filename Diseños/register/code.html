<!-- Left Side: Form Panel -->
<main class="w-full md:w-[40%] min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative z-10">
<!-- Glassmorphism Container -->
<div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-xl p-8 shadow-2xl shadow-black/50">

<span aria-hidden="true" class="material-symbols-outlined text-4xl text-primary mb-stack-sm">confirmation_number</span>
<h1 class="font-headline-lg text-headline-lg text-primary mb-stack-sm">Únete a StageFront</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Crea tu cuenta para asegurar tu lugar en la historia</p>
</div>

<div class="flex border-b border-surface-variant mb-stack-lg">
<button class="flex-1 pb-4 font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors duration-300">
                    Iniciar Sesión
                </button>
<button class="flex-1 pb-4 font-body-md text-body-md text-primary border-b-2 border-primary">
                    Crear Cuenta
                </button>
</div>
<!-- Form -->
<form class="space-y-stack-md">
<!-- Full Name Input -->
<div class="relative group">
<label class="sr-only" for="fullName">Nombre completo</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">person</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-b border-surface-variant text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:bg-white/5 transition-all duration-300 rounded-t-DEFAULT placeholder:text-on-surface-variant/50" id="fullName" name="fullName" placeholder="Nombre completo" type="text"/>
</div>
<!-- Email Input -->
<div class="relative group">
<label class="sr-only" for="email">Correo electrónico</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-b border-surface-variant text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:bg-white/5 transition-all duration-300 rounded-t-DEFAULT placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="Correo electrónico" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<label class="sr-only" for="password">Contraseña</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-b border-surface-variant text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary focus:bg-white/5 transition-all duration-300 rounded-t-DEFAULT placeholder:text-on-surface-variant/50" id="password" name="password" placeholder="Contraseña" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full mt-stack-lg bg-primary text-on-primary font-label-caps text-label-caps py-4 rounded-DEFAULT uppercase tracking-widest hover:bg-primary-fixed transition-colors duration-300" type="button">
                    Registrarse
                </button>
</form>
<div class="mt-stack-md text-center">
<p class="font-body-md text-body-md text-on-surface-variant text-sm">
                    Al registrarte, aceptas nuestros <a class="text-primary hover:underline" href="#">Términos</a> y <a class="text-primary hover:underline" href="#">Privacidad</a>.
                </p>
</div>
</div>
</main>
