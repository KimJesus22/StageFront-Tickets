<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StageFront - Seat Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#2f3131",
                        "surface-container": "#201f1f",
                        "surface-dim": "#141313",
                        "surface-variant": "#353434",
                        "on-error-container": "#ffdad6",
                        "primary": "#ffffff",
                        "on-tertiary-container": "#636565",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary": "#c8c6c8",
                        "on-tertiary-fixed-variant": "#454747",
                        "surface-tint": "#c6c6c7",
                        "primary-fixed-dim": "#c6c6c7",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "surface-container-low": "#1c1b1b",
                        "on-tertiary-fixed": "#1a1c1c",
                        "primary-container": "#e2e2e2",
                        "on-secondary-container": "#b7b4b7",
                        "on-secondary": "#313032",
                        "inverse-surface": "#e5e2e1",
                        "inverse-primary": "#5d5f5f",
                        "tertiary-fixed": "#e2e2e2",
                        "on-secondary-fixed-variant": "#474649",
                        "on-error": "#690005",
                        "tertiary-container": "#e2e2e2",
                        "on-primary-fixed": "#1a1c1c",
                        "on-primary-container": "#636565",
                        "on-secondary-fixed": "#1c1b1d",
                        "on-primary": "#2f3131",
                        "on-primary-fixed-variant": "#454747",
                        "error": "#ffb4ab",
                        "on-surface-variant": "#c4c7c8",
                        "primary-fixed": "#e2e2e2",
                        "outline": "#8e9192",
                        "surface-bright": "#3a3939",
                        "inverse-on-surface": "#313030",
                        "surface-container-high": "#2a2a2a",
                        "background": "#141313",
                        "on-background": "#e5e2e1",
                        "surface-container-highest": "#353434",
                        "error-container": "#93000a",
                        "surface": "#141313",
                        "outline-variant": "#444748",
                        "tertiary": "#ffffff",
                        "secondary-container": "#474649",
                        "on-surface": "#e5e2e1",
                        "secondary-fixed-dim": "#c8c6c8",
                        "secondary-fixed": "#e5e1e4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "48px",
                        "unit": "4px",
                        "gutter": "24px",
                        "stack-sm": "8px",
                        "margin-desktop": "48px",
                        "stack-md": "24px",
                        "margin-mobile": "16px",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "display-xl": ["Space Grotesk"],
                        "label-caps": ["Inter"],
                        "headline-lg": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Hide scrollbar for cleaner UI in lists */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden selection:bg-primary selection:text-on-primary">
<!-- 
      Contextual Note: 
      As a task-focused, transactional screen (Seat Selection before Checkout), 
      the global navigation shell (TopAppBar, SideNavBar, BottomNavBar) is suppressed 
      to maintain focus on the map and checkout flow.
    -->
<div class="flex flex-col md:flex-row h-screen w-full relative">
<!-- Main Content Area: Stadium Map Canvas -->
<main class="flex-1 relative bg-surface-container-lowest overflow-hidden">
<!-- Contextual Header / Back Navigation -->
<div class="absolute top-0 left-0 w-full z-10 p-gutter bg-gradient-to-b from-background/90 to-transparent flex items-center justify-between">
<button class="w-12 h-12 rounded-full bg-surface-container-highest/50 backdrop-blur-md border border-outline-variant/30 flex items-center justify-center text-on-surface hover:bg-surface-bright/50 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="text-right">
<h1 class="font-headline-md text-headline-md text-on-surface">The After Hours Tour</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Estadio Nacional</p>
</div>
</div>
<!-- Map Placeholder / Background -->
<div class="w-full h-full relative flex items-center justify-center">
<!-- A highly stylized abstract seating map visual representation -->
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1540039155732-6761b54f22ce?auto=format&amp;fit=crop&amp;q=80')] bg-cover bg-center opacity-30 mix-blend-luminosity" data-alt="A highly detailed, futuristic wireframe rendering of a massive stadium seating chart viewed from top-down. The digital map is composed of fine, glowing neon cyan and bright white geometric lines against a pitch-black, infinite void. The aesthetic is extremely high-tech, precise, and ethereal, reminiscent of a holographic interface in a sci-fi command center. The lighting is exclusively emitted from the glowing schematic lines, creating a stark, high-contrast dark mode environment.">
</div>
<!-- Interactive Map UI Placeholder (Center focus) -->
<div class="relative z-0 w-[600px] h-[600px] border border-outline-variant/20 rounded-full flex items-center justify-center">
<div class="w-[400px] h-[400px] border border-outline-variant/40 rounded-full flex items-center justify-center">
<div class="w-[200px] h-[200px] border border-outline-variant/60 rounded-full bg-surface-container-high/30 backdrop-blur-sm flex items-center justify-center animate-[pulse_4s_ease-in-out_infinite]">
<span class="font-label-caps text-label-caps text-outline uppercase tracking-widest">Stage</span>
</div>
</div>
</div>
<!-- Floating Tooltip Example on Map -->
<div class="absolute top-1/3 right-1/3 bg-surface-container-highest/90 backdrop-blur-md border border-outline-variant/50 px-stack-sm py-unit rounded-lg flex items-center gap-unit shadow-lg transform -translate-y-4">
<div class="w-2 h-2 rounded-full bg-[#a7f3d0] shadow-[0_0_8px_#a7f3d0]"></div>
<span class="font-label-caps text-label-caps text-on-surface">VIP L</span>
</div>
</div>
</main>
<!-- Floating Summary Panel / Sticky Sidebar -->
<!-- Fixed at bottom on mobile, right sidebar on desktop -->
<aside class="fixed bottom-0 left-0 w-full md:relative md:w-[400px] md:h-full bg-surface-container-high/80 backdrop-blur-xl border-t md:border-t-0 md:border-l border-outline-variant/30 z-50 flex flex-col rounded-t-xl md:rounded-none shadow-[0_-20px_50px_rgba(0,0,0,0.6)] md:shadow-[-20px_0_50px_rgba(0,0,0,0.6)] transition-all duration-300">
<!-- Mobile Drag Handle -->
<div class="w-full flex justify-center pt-stack-sm pb-unit md:hidden">
<div class="w-12 h-1 bg-outline-variant/50 rounded-full"></div>
</div>
<div class="p-gutter flex flex-col h-full max-h-[614px] md:max-h-none">
<!-- Header / Counter -->
<div class="mb-stack-md shrink-0">
<h2 class="font-headline-md text-headline-md text-on-surface mb-unit">Resumen</h2>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-unit">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">confirmation_number</span>
                        2 asientos seleccionados
                    </p>
</div>
<!-- Selected Seats List (Scrollable) -->
<div class="flex-1 overflow-y-auto no-scrollbar space-y-stack-sm mb-stack-md pr-unit relative">
<!-- Top fade mask for scroll -->
<div class="absolute top-0 left-0 w-full h-4 bg-gradient-to-b from-surface-container-high/80 to-transparent z-10 pointer-events-none"></div>
<!-- Seat Item 1 -->
<div class="bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg p-stack-sm flex items-center justify-between group hover:border-outline-variant/50 transition-colors">
<div class="flex items-center gap-stack-sm">
<div class="w-8 h-8 rounded-full bg-surface-bright flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">event_seat</span>
</div>
<div>
<p class="font-body-md text-body-md text-on-surface leading-tight">General B</p>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Fila 12 • Asiento 4</p>
</div>
</div>
<div class="text-right flex items-center gap-stack-sm">
<span class="font-headline-md text-[20px] text-on-surface font-medium">$150</span>
<button class="w-8 h-8 rounded-full flex items-center justify-center text-outline hover:text-error hover:bg-error-container/20 transition-colors">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
</div>
<!-- Seat Item 2 -->
<div class="bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg p-stack-sm flex items-center justify-between group hover:border-outline-variant/50 transition-colors">
<div class="flex items-center gap-stack-sm">
<div class="w-8 h-8 rounded-full bg-surface-bright flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">star</span>
</div>
<div>
<p class="font-body-md text-body-md text-on-surface leading-tight">VIP L</p>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Fila 1 • Asiento 1</p>
</div>
</div>
<div class="text-right flex items-center gap-stack-sm">
<span class="font-headline-md text-[20px] text-on-surface font-medium">$150</span>
<button class="w-8 h-8 rounded-full flex items-center justify-center text-outline hover:text-error hover:bg-error-container/20 transition-colors">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
</div>
<!-- Bottom fade mask for scroll -->
<div class="absolute bottom-0 left-0 w-full h-4 bg-gradient-to-t from-surface-container-high/80 to-transparent z-10 pointer-events-none"></div>
</div>
<!-- Footer Summary & CTA -->
<div class="shrink-0 pt-stack-sm border-t border-outline-variant/20">
<div class="flex justify-between items-end mb-stack-md">
<span class="font-body-md text-body-md text-on-surface-variant">Total</span>
<span class="font-headline-lg text-headline-lg text-primary tracking-tight">Total: $300.00</span>
</div>
<!-- Primary CTA Button (Active State as requested) -->
<button class="w-full bg-primary text-on-primary font-label-caps text-label-caps uppercase tracking-widest py-[16px] px-gutter rounded-lg flex items-center justify-center gap-stack-sm font-bold shadow-[0_0_20px_rgba(255,255,255,0.15)] hover:scale-[1.02] hover:shadow-[0_0_30px_rgba(255,255,255,0.25)] transition-all duration-300">
<span>Continuar al Pago</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<!-- Secure checkout trust badge -->
<div class="mt-stack-sm flex items-center justify-center gap-unit opacity-50">
<span class="material-symbols-outlined text-[14px]">lock</span>
<span class="font-label-caps text-[10px] text-on-surface uppercase tracking-wider">Pago Seguro encriptado</span>
</div>
</div>
</div>
</aside>
</div>
</body></html>
