<span class="font-label-caps text-label-caps text-primary tracking-widest uppercase bg-white/10 px-3 py-1.5 rounded-full border border-white/20 backdrop-blur-sm shadow-[0_0_12px_rgba(255,255,255,0.1)]">

                    </span>
<span class="font-label-caps text-label-caps text-on-surface-variant">
                        SÁB, 24 NOV
                    </span>

<h1 class="font-display-xl text-display-xl text-primary leading-none drop-shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                        BTS

</div>

<p class="font-body-md text-body-md text-on-surface-variant mt-stack-md text-center">
